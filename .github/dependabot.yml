version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["type/chore", "dependencies"]
    commit-message:
      prefix: "chore"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels: ["type/ci", "dependencies"]
    commit-message:
      prefix: "ci"
      include: scope
