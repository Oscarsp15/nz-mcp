# Labels canónicos del repo. Sincronizados por .github/workflows/sync-labels.yml.
# No crear labels ad-hoc en GitHub UI — añadir aquí y abrir PR.

# === Estado del issue / PR ===
- name: triage
  color: "d4c5f9"
  description: "Recién creado, sin clasificar"
- name: ai-ready
  color: "0e8a16"
  description: "Bien definido, una IA puede tomarlo"
- name: needs-spec
  color: "fbca04"
  description: "Falta definición; humano debe afinar"
- name: human-only
  color: "b60205"
  description: "Requiere humano (decisión arquitectónica, validación de seguridad)"
- name: claimed
  color: "5319e7"
  description: "Una IA está trabajando en este issue"
- name: blocked
  color: "e99695"
  description: "Depende de otro issue/PR sin resolver"
- name: wontfix
  color: "ffffff"
  description: "Decidido no implementar"
- name: stale-branch
  color: "c2e0c6"
  description: "Branch sin actividad > 5 días"

# === Tipo ===
- name: type/bug
  color: "d73a4a"
  description: "Algo no funciona"
- name: type/feature
  color: "a2eeef"
  description: "Capacidad nueva"
- name: type/tool
  color: "1d76db"
  description: "Tool MCP nueva o cambio en una existente"
- name: type/security
  color: "b60205"
  description: "Seguridad"
- name: type/refactor
  color: "fbca04"
  description: "Refactor sin cambio de comportamiento"
- name: type/docs
  color: "0075ca"
  description: "Documentación"
- name: type/adr
  color: "5319e7"
  description: "Decisión arquitectónica"
- name: type/chore
  color: "c5def5"
  description: "Mantenimiento"
- name: type/test
  color: "bfd4f2"
  description: "Tests"

