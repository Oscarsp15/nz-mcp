repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(\.secrets\.baseline|tests/.*\.json)$

  - repo: local
    hooks:
      - id: validate-branch-name
        name: Validar nombre de branch
        entry: python scripts/check_branch_name.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-push]

      - id: validate-commit-msg
        name: Validar mensaje de commit
        entry: python scripts/check_commit_msg.py
        language: system
        stages: [commit-msg]

      - id: repo-hygiene
        name: Bloquea archivos temporales / auto-ayuda
        entry: python scripts/check_repo_hygiene.py
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit, pre-push]
